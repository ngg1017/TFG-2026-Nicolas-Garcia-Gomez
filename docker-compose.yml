version: '3.8'

services:
  #1: BBDD de prueba
  db_hospital:
    image: postgres:15
    container_name: postgres_tfg
    restart: always
    #Lee las contraseñas del archivo .env
    env_file:
      - .env
    ports:
      - "5433:5432"
    #Esto crea un disco duro virtual para que no perder los pacientes al apagar el Docker
    volumes:
      - pgdata:/var/lib/postgresql/data

  #2: Aplicación de Reflex
  calculadora-app:
    build: .
    container_name: reflex_app_tfg
    restart: always
    #Obligamos a que espere a que la base de datos se encienda primero
    depends_on:
      - db_hospital
    #Le pasamos las variables de entorno para que se conecte
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "8000:8000"

#Declaramos el disco duro virtual para la base de datos
volumes:
  pgdata: